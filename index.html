<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intern Tracker · IT Department</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f; --bg-sidebar:#0d0d16; --bg-card:#13131e; --bg-card-hover:#181826;
    --bg-input:#0f0f18; --border:#232331; --border-soft:#1a1a26;
    --text:#f2f2f5; --text-dim:#8c8c9c; --text-faint:#5c5c6c;
    --blue:#3b82f6; --blue-dim:rgba(59,130,246,.14); --blue-line:rgba(59,130,246,.35);
    --green:#22c55e; --green-dim:rgba(34,197,94,.14);
    --amber:#f59e0b; --amber-dim:rgba(245,158,11,.14);
    --red:#ef4444; --red-dim:rgba(239,68,68,.14);
    --purple:#a855f7; --purple-dim:rgba(168,85,247,.14);
    --radius:14px; --radius-sm:9px;
    --shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  body.light{
    --bg:#f3f4f8; --bg-sidebar:#ffffff; --bg-card:#ffffff; --bg-card-hover:#f7f8fb;
    --bg-input:#f3f4f8; --border:#e6e8f0; --border-soft:#eef0f5;
    --text:#15151f; --text-dim:#65657a; --text-faint:#9797a8;
    --blue-dim:rgba(59,130,246,.10); --green-dim:rgba(34,197,94,.10);
    --amber-dim:rgba(245,158,11,.10); --red-dim:rgba(239,68,68,.10); --purple-dim:rgba(168,85,247,.10);
    --shadow: 0 1px 3px rgba(20,20,40,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;width:auto;max-width:none;flex:none;}
  input,textarea,select{font-family:inherit;}
  ::placeholder{color:var(--text-faint);}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    width:100%; max-width:400px; background:var(--bg-card); border:1px solid var(--border);
    border-radius:20px; padding:36px 32px; box-shadow:var(--shadow);
  }
  .login-logo{display:flex; align-items:center; gap:12px; margin-bottom:26px;}
  .logo-badge{
    width:40px;height:40px;border-radius:11px;background:linear-gradient(155deg,var(--blue),#1d4ed8);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:.5px;
    flex-shrink:0;
  }
  .login-title{font-size:15px;font-weight:700;}
  .login-sub{font-size:11px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
  .login-heading{font-size:22px;font-weight:800;margin:4px 0 6px;}
  .login-desc{font-size:13.5px;color:var(--text-dim);margin-bottom:24px;line-height:1.5;}
  .role-tabs{display:flex;gap:8px;margin-bottom:18px;background:var(--bg-input);border:1px solid var(--border);border-radius:11px;padding:4px;}
  .role-tab{flex:1;text-align:center;padding:9px 0;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-dim);border:none;background:transparent;transition:.15s;}
  .role-tab.active{background:var(--blue);color:#fff;}
  .field-label{font-size:11.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:block;}
  select,input[type=text],input[type=email],input[type=password],input[type=date],textarea{
    width:100%; background:var(--bg-input); border:1px solid var(--border); color:var(--text);
    border-radius:var(--radius-sm); padding:10px 12px; font-size:13.5px; outline:none;
  }
  select:focus,input:focus,textarea:focus{border-color:var(--blue-line);}
  .btn{
    box-sizing:border-box;
    border:none;
    border-radius:9px;
    min-height:38px;
    padding:9px 16px;
    font-size:13.5px;
    font-weight:600;
    line-height:1.2;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    cursor:pointer;
  }
  .btn-full{
    display:flex;
    width:100%;
    min-height:40px;
    margin-top:6px;
  }
  .btn svg{
    width:16px;
    height:16px;
    flex:0 0 16px;
  }
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#2f6fe0;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
  .btn-soft{background:var(--blue-dim);color:var(--blue);}
  .btn-soft:hover{background:var(--blue-line);}
  .btn-danger-soft{background:var(--red-dim);color:var(--red);}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .hint{font-size:11.5px;color:var(--text-faint);margin-top:8px;line-height:1.5;}
  .err{font-size:12px;color:var(--red);margin-top:8px;}

  /* ---------- App shell ---------- */
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{
    width:250px;background:var(--bg-sidebar);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 14px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 22px;}
  .menu-eyebrow{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.09em;font-weight:700;padding:0 10px;margin-bottom:8px;}
  .nav{display:flex;flex-direction:column;gap:2px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);
    font-size:13.5px;font-weight:600;color:var(--text-dim);border:none;background:transparent;width:100%;text-align:left;
  }
  .nav-item svg{width:17px;height:17px;flex-shrink:0;}
  .nav-item:hover{background:var(--bg-card-hover);color:var(--text);}
  .nav-item.active{background:var(--blue-dim);color:var(--blue);}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);margin-left:auto;}
  .sidebar-spacer{flex:1;}
  .sidebar-foot{display:flex;flex-direction:column;gap:4px;padding-top:10px;border-top:1px solid var(--border-soft);}
  .user-card{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);}
  .avatar{
    width:32px;height:32px;border-radius:9px;background:var(--purple-dim);color:var(--purple);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex-shrink:0;
  }
  .user-card.super .avatar{background:var(--blue-dim);color:var(--blue);}
  .user-name{font-size:13px;font-weight:700;line-height:1.2;}
  .user-role{font-size:10.5px;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}

  .main{margin-left:250px;flex:1;padding:32px 38px 60px;max-width:1180px;}
  .eyebrow{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:26px;flex-wrap:wrap;}
  .page-title{font-size:26px;font-weight:800;letter-spacing:-.01em;}
  .page-desc{font-size:13.5px;color:var(--text-dim);margin-top:5px;}

  /* ---------- Cards / stats ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 18px;box-shadow:var(--shadow);}
  .stat-card{display:flex;flex-direction:column;gap:14px;}
  .stat-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .stat-label{font-size:10.5px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em;}
  .stat-value{font-size:26px;font-weight:800;}
  .icon-badge{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-badge svg{width:17px;height:17px;}
  .ib-blue{background:var(--blue-dim);color:var(--blue);}
  .ib-green{background:var(--green-dim);color:var(--green);}
  .ib-amber{background:var(--amber-dim);color:var(--amber);}
  .ib-red{background:var(--red-dim);color:var(--red);}
  .ib-purple{background:var(--purple-dim);color:var(--purple);}

  .row-2{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px;}
  .section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px;box-shadow:var(--shadow);}
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .section-title{font-size:14.5px;font-weight:700;}
  .section-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px;}
  .link-more{font-size:12px;font-weight:700;color:var(--blue);}

  table{width:100%;border-collapse:collapse;}
  th{
    text-align:left;font-size:10.5px;font-weight:700;color:var(--text-faint);
    text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border-soft);
  }
  td{padding:11px 10px;font-size:13px;border-bottom:1px solid var(--border-soft);}
  tr:last-child td{border-bottom:none;}
  .id-link{color:var(--blue);font-weight:700;font-size:12.5px;}

  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid transparent;}
  .pill-blue{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-line);}
  .pill-green{background:var(--green-dim);color:var(--green);}
  .pill-amber{background:var(--amber-dim);color:var(--amber);}
  .pill-red{background:var(--red-dim);color:var(--red);}
  .pill-gray{background:var(--bg-input);color:var(--text-dim);border-color:var(--border);}

  .empty-state{padding:30px 12px;text-align:center;color:var(--text-faint);font-size:13px;}
  .empty-state svg{width:26px;height:26px;margin-bottom:8px;opacity:.5;}

  /* ---------- tabs / toolbar ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  .toolbar select, .toolbar input[type=date]{width:auto;min-width:150px;}
  .seg{display:flex;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;gap:2px;}
  .seg button{background:transparent;border:none;color:var(--text-dim);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:7px;}
  .seg button.active{background:var(--blue);color:#fff;}

  /* ---------- daily task blocks ---------- */
  .task-block{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .task-block-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .task-num{
    width:30px;height:30px;border-radius:9px;background:var(--blue-dim);color:var(--blue);font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .task-block-title{font-size:14.5px;font-weight:700;}
  .task-block-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px;}
  .mode-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .mode-btn{flex:1;padding:8px 0;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-input);color:var(--text-dim);font-size:12.5px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;}
  .mode-btn svg{width:14px;height:14px;}
  .mode-btn.active{border-color:var(--blue-line);background:var(--blue-dim);color:var(--blue);}
  textarea{min-height:64px;resize:vertical;}
  .quick-btn{font-size:11px;color:var(--text-dim);background:var(--bg-input);border:1px solid var(--border);padding:4px 9px;border-radius:99px;margin-top:8px;}
  .quick-btn:hover{color:var(--text);}

  .dropzone{
    border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:22px 14px;text-align:center;
    background:var(--bg-input);cursor:pointer;
  }
  .dropzone svg{width:20px;height:20px;color:var(--text-faint);margin-bottom:6px;}
  .dropzone p{font-size:12.5px;color:var(--text-dim);margin:0;}
  .dropzone span{font-size:11px;color:var(--text-faint);}
  .photo-preview{position:relative;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
  .photo-preview img{width:100%;max-height:230px;object-fit:cover;display:block;}
  .photo-remove{
    position:absolute;top:8px;right:8px;background:rgba(10,10,15,.75);color:#fff;border:none;
    width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  }
  .photo-remove svg{width:13px;height:13px;}

  .check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border-soft);}
  .check-row:last-child{border-bottom:none;}
  .checkbox{
    width:19px;height:19px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;background:var(--bg-input);
  }
  .checkbox.checked{background:var(--green);border-color:var(--green);}
  .checkbox svg{width:12px;height:12px;color:#fff;}
  .check-label{font-size:13px;font-weight:600;}
  .check-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px;}
  .progress-bar{height:5px;border-radius:99px;background:var(--bg-input);overflow:hidden;margin-top:10px;}
  .progress-bar > div{height:100%;background:var(--green);border-radius:99px;}
  .thu-banner{display:flex;align-items:center;gap:8px;background:var(--amber-dim);color:var(--amber);padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;margin-bottom:14px;}
  .thu-banner svg{width:14px;height:14px;flex-shrink:0;}

  .save-bar{display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}

  /* ---------- assigned tasks ---------- */
  .task-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;gap:14px;align-items:flex-start;box-shadow:var(--shadow);}
  .task-card-title{font-size:13.5px;font-weight:700;}
  .task-card-desc{font-size:12.5px;color:var(--text-dim);margin-top:4px;line-height:1.5;}
  .task-meta{display:flex;gap:10px;margin-top:9px;flex-wrap:wrap;}
  .meta-chip{font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:4px;}
  .meta-chip svg{width:12px;height:12px;}
  .task-card-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;}

  /* ---------- modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(6,6,10,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:440px;padding:24px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .modal-title{font-size:16px;font-weight:800;}
  .modal-close{background:var(--bg-input);border:1px solid var(--border);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);}
  .modal-close svg{width:13px;height:13px;}
  .field{margin-bottom:14px;}

  /* ---------- toast ---------- */
  #toastRoot{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;padding:11px 16px;font-size:12.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);animation:slideIn .2s ease;}
  .toast.error{border-left-color:var(--red);}
  @keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* ---------- Google btn ---------- */
  .btn-google{background:#fff;color:#1f1f1f;border:1px solid #dadce0;gap:10px;}
  .btn-google:hover{background:#f8f8f8;}
  body.light .btn-google{background:#fff;color:#1f1f1f;}
  .google-icon{width:18px;height:18px;flex-shrink:0;}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text-faint);font-size:11.5px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  @media(max-width:880px){
    .sidebar{width:74px;padding:16px 10px;}
    .sidebar .label-text, .sidebar .brand-text, .sidebar .user-text{display:none;}
    .main{margin-left:74px;padding:22px 16px 50px;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .row-2{grid-template-columns:1fr;}
  }
</style>
</head>

<div id="appShell" style="display:none">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main"><div id="mainContent"></div></main>
  </div>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

// NOTE: All daily-log/task data still lives in the browser localStorage layer
// (unchanged from original). Only auth state is now driven by Supabase session.
function browserStorageKey(key, shared){
  return `intern-tracker:${shared ? 'shared' : 'local'}:${key}`;
}
async function sGet(key, shared=true){
  try{
    if(window.storage && typeof window.storage.get==='function'){
      const r = await window.storage.get(key, shared);
      if(r) return JSON.parse(r.value);
    }
  }catch(e){ console.warn('Preview storage unavailable; using browser storage.', e); }
  try{
    const value = localStorage.getItem(browserStorageKey(key, shared));
    return value ? JSON.parse(value) : null;
  }catch(e){ return null; }
}
async function sSet(key, val, shared=true){
  try{
    if(window.storage && typeof window.storage.set==='function'){
      const r = await window.storage.set(key, JSON.stringify(val), shared);
      if(r) return true;
    }
  }catch(e){ console.warn('Preview storage unavailable; using browser storage.', e); }
  try{
    localStorage.setItem(browserStorageKey(key, shared), JSON.stringify(val));
    return true;
  }catch(e){ console.error('storage set failed', e); return false; }
}
async function sDel(key, shared=true){
  try{
    if(window.storage && typeof window.storage.delete==='function') await window.storage.delete(key, shared);
  }catch(e){}
  try{ localStorage.removeItem(browserStorageKey(key, shared)); }catch(e){}
}

/* ============================= AUTH HELPERS ============================= */
/**
 * Fetch the authenticated user's profile row from public.profiles.
 * Returns null if not authenticated or no matching profile.
 */
async function fetchProfile(){
  const { data: { user } } = await window.db.auth.getUser();
  if(!user) return null;
  const { data, error } = await window.db
    .from('profiles')
    .select('id, full_name, role')
    .eq('id', user.id)
    .maybeSingle();
  if(error){ console.error('fetchProfile error:', error); return null; }
  return data;   // { id, full_name, role }
}

/**
 * After a Google OAuth sign-in the user may not have a profile row yet
 * (first login). Create one with role='intern' so the app can continue.
 * The supervisor must already have a profile row (created manually or via
 * the Supabase dashboard).
 */
async function ensureProfile(supabaseUser, fullName){
  const existing = await fetchProfile();
  if(existing) return existing;
  // First-time Google sign-in → create a default 'intern' profile
  const name = fullName
    || supabaseUser.user_metadata?.full_name
    || supabaseUser.email?.split('@')[0]
    || 'Unknown';
  const { data, error } = await window.db
    .from('profiles')
    .insert({ id: supabaseUser.id, full_name: name, role: 'intern' })
    .select('id, full_name, role')
    .single();
  if(error){ console.error('ensureProfile insert error:', error); return null; }
  return data;
}

/* ============================= IMAGE COMPRESSION ============================= */
function fileToCompressedDataURL(file, maxW=760, quality=0.62){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('read failed'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('image decode failed'));
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================= BOOT ============================= */
async function boot(){
  state.interns = (await sGet('interns', true)) || [];
  state.tasks   = (await sGet('tasks',   true)) || [];

  // Let Supabase restore any persisted session from localStorage first.
  // getSession() is sync-fast when the JWT is still valid.
  const { data: { session } } = await window.db.auth.getSession();

  if(session){
    // There is a live Supabase session — use it directly.
    await handleSession(session);
  } else {
    // No active session → show login.
    showLogin();
  }

  // React to future auth events (OAuth callback, token refresh, sign-out)
  window.db.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session){
      await handleSession(session);
    } else if(event === 'SIGNED_OUT'){
      state.user = null;
      showLogin();
    } else if(event === 'TOKEN_REFRESHED' && session){
      // Token was silently refreshed — nothing to do, session remains valid.
    }
  });
}

/**
 * Called whenever we have a confirmed Supabase session.
 * Resolves the profile row and then bootstraps the app.
 */
async function handleSession(session){
  const profile = await fetchProfile();
  if(!profile){
    // Could be a first-time Google sign-in; try to create a profile row.
    const created = await ensureProfile(session.user);
    if(!created){
      toast('Could not load your profile. Contact an administrator.', true);
      await window.db.auth.signOut();
      return;
    }
    state.user = { id: created.id, name: created.full_name, role: created.role };
  } else {
    state.user = { id: profile.id, name: profile.full_name, role: profile.role };
  }

  if(state.user.role === 'supervisor'){
    state.logInternSel = state.interns[0] || null;
  } else {
    state.logInternSel = state.user.name;
  }
  showApp();
}

boot();

/* ============================= LOGIN EVENTS ============================= */
document.getElementById('loginScreen').addEventListener('click', e=>{
  const roleBtn = e.target.closest('[data-action="set-login-role"]');
  if(roleBtn){ loginRole = roleBtn.dataset.role; showLogin(); }

  const googleBtn = e.target.closest('[data-action="login-google"]');
  if(googleBtn) loginWithGoogle();
});

document.getElementById('loginScreen').addEventListener('submit', async e=>{
  e.preventDefault();
  const form = e.target;

  if(form.dataset.action === 'login-intern'){
    // Legacy name-based login (no Supabase auth session).
    const existing = form.existing.value;
    const newName  = form.newName.value.trim();
    let name = existing || newName;
    if(!name){ toast('Please select or enter your name', true); return; }
    if(newName && !existing){
      if(!state.interns.includes(newName)){
        state.interns.push(newName);
        await sSet('interns', state.interns, true);
      }
      name = newName;
    }
    state.user = { id: null, name, role: 'intern' };
    state.logInternSel = name;
    showApp();

  } else if(form.dataset.action === 'login-supervisor'){
    const email    = form.email.value.trim();
    const password = form.password.value;
    const btn      = form.querySelector('[type=submit]');
    btn.disabled   = true;
    btn.textContent = 'Signing in…';

    const { error } = await window.db.auth.signInWithPassword({ email, password });
    btn.disabled    = false;
    btn.innerHTML   = `${icon('arrow')} Continue as Supervisor`;

    if(error){
      toast(error.message || 'Invalid email or password', true);
      return;
    }
    // onAuthStateChange will fire SIGNED_IN → handleSession() → showApp()
  }
});

async function loginWithGoogle(){
  // redirectTo must match an entry in Supabase → Auth → Redirect URLs.
  // For a local HTML file use the file's full URL; for a hosted app use its origin.
  const redirectTo = window.location.href.split('?')[0].split('#')[0];
  const { error } = await window.db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo,
      queryParams: { access_type: 'offline', prompt: 'select_account' },
    },
  });
  if(error) toast(error.message || 'Google sign-in failed', true);
  // Supabase redirects the browser to Google; on return it fires onAuthStateChange.
}

          <div style="padding:10px 0;border-bottom:1px solid var(--border-soft)">

            <div style="font-size:11px;color:var(--text-faint);margin-top:2px">${state.user.role==='supervisor' ? escapeHtml(t.intern) : (t.dueDate?('Due '+fmtDate(t.dueDate)):'No due date')}</div>
          </div>`).join('') : `<div class="empty-state">${icon('check2')}<div>No pending tasks.</div></div>`}
      </div>
    </div>
  `;
}
function statusPill(section){
  if(!section) return '<span class="pill pill-gray">Not logged</span>';
  if(section.photo) return '<span class="pill pill-green">Ticket photo</span>';
  if((section.remark||'').trim()) return '<span class="pill pill-blue">Remark</span>';
  return '<span class="pill pill-gray">Not logged</span>';
}
function infoPill(info){
  if(!info) return '<span class="pill pill-gray">Not started</span>';
  const it = info.items||{};
  const n = [it.review,it.design,it.upload].filter(Boolean).length;
  if(n===3) return '<span class="pill pill-green">Complete</span>';
  if(n>0) return '<span class="pill pill-amber">'+n+'/3</span>';
  return '<span class="pill pill-gray">Not started</span>';
}

/* ============================= DAILY LOG PAGE ============================= */
async function renderDailyLogPage(container){
  container.innerHTML = `<div class="empty-state">Loading…</div>`;
  if(state.user.role==='supervisor'){
    if(!state.logInternSel) state.logInternSel = state.interns[0]||null;
    await renderSupervisorDailyLog(container);
  } else {
    await renderInternDailyLog(container);
  }
}

async function renderSupervisorDailyLog(container){
  const internOpts = state.interns.map(n=>`<option value="${escapeHtml(n)}" ${state.logInternSel===n?'selected':''}>${escapeHtml(n)}</option>`).join('');
  container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Daily Logs</div><div class="page-title">Team Daily Task Log</div><div class="page-desc">Review what each intern submitted for a given day.</div></div>
    </div>
    <div class="toolbar">
      <input type="date" id="dlDate" value="${state.dateSel}">
      <select id="dlIntern">${internOpts}</select>
    </div>
    <div id="dlBody"></div>
  `;
  document.getElementById('dlDate').addEventListener('change', e=>{ state.dateSel=e.target.value; renderSupervisorDailyLogBody(); });
  document.getElementById('dlIntern').addEventListener('change', e=>{ state.logInternSel=e.target.value; renderSupervisorDailyLogBody(); });
  await renderSupervisorDailyLogBody();
}
async function renderSupervisorDailyLogBody(){
  const body = document.getElementById('dlBody');
  if(!body) return;
  if(!state.logInternSel){ body.innerHTML = `<div class="empty-state">${icon('users')}<div>No interns added yet. Add one from the Team page.</div></div>`; return; }
  body.innerHTML = `<div class="empty-state">Loading…</div>`;
  const e = await sGet('daily:'+state.logInternSel+':'+state.dateSel, true);
  const thu = isThursday(state.dateSel);
  body.innerHTML = `
    ${readonlyTaskBlock(1,'ticket','Ticketing System Support','Tickets handled across departments', e && e.ticketing)}
    ${readonlyTaskBlock(2,'mail','Email Issue Resolution','Bounce-back / send failures resolved', e && e.email)}
    ${thu ? readonlyInfographicBlock(e && e.infographic) : ''}
  `;
}
function readonlyTaskBlock(num, iconName, title, sub, section){
  let body;
  if(!section || (!section.photo && !(section.remark||'').trim())){
    body = `<div class="empty-state">${icon('note')}<div>Not logged for this day.</div></div>`;
  } else if(section.photo){
    body = `<div class="photo-preview"><img src="${section.photo}"></div>`;
  } else {
    body = `<div style="font-size:13px;color:var(--text-dim);background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px">${escapeHtml(section.remark)}</div>`;
  }
  return `<div class="task-block"><div class="task-block-head"><div class="task-num">${num}</div><div><div class="task-block-title">${title}</div><div class="task-block-sub">${sub}</div></div></div>${body}</div>`;
}
function readonlyInfographicBlock(info){
  const it = (info && info.items) || {};
  const rows = [['review','Reviewed the IT Updates sheet'],['design','Designed the infographic in Canva'],['upload','Uploaded before Thursday deadline']];
  return `<div class="task-block"><div class="task-block-head"><div class="task-num">3</div><div><div class="task-block-title">IT Awareness Infographic</div><div class="task-block-sub">Thursday weekly checklist</div></div></div>
    ${rows.map(([k,label])=>`<div class="check-row"><div class="checkbox ${it[k]?'checked':''}">${it[k]?icon('check2'):''}</div><div><div class="check-label">${label}</div></div></div>`).join('')}
  </div>`;
}

async function renderInternDailyLog(container){
  state.dateSel = todayStr();
  container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Daily Log</div><div class="page-title">Log Your Daily Tasks</div><div class="page-desc">Fill this in every day before you sign off.</div></div>
    </div>
    <div class="toolbar"><span class="pill pill-blue">${icon('calendar')} Today · ${fmtDate(state.dateSel)}</span></div>
    <div id="dlBody"></div>
  `;
  await loadDraftAndRender();
}
async function loadDraftAndRender(){
  const name = state.user.name;
  const existing = await sGet('daily:'+name+':'+state.dateSel, true);
  state.draft = existing || newDailyDraft();
  renderDraft();
}
function renderDraft(){
  const body = document.getElementById('dlBody');
  if(!body) return;
  if(state.draft.completedAt){
    body.innerHTML = `
      <div class="thu-banner">${icon('check2')} Daily task completed for ${fmtDate(state.dateSel)}. A new log will be available tomorrow.</div>
      ${readonlyTaskBlock(1,'ticket','Ticketing System Support','Tickets handled across departments',state.draft.ticketing)}
      ${readonlyTaskBlock(2,'mail','Email Issue Resolution','Bounce-back / send failures resolved',state.draft.email)}
      ${isThursday(state.dateSel) ? readonlyInfographicBlock(state.draft.infographic) : ''}
    `;
    return;
  }
  const thu = isThursday(state.dateSel);
  body.innerHTML = `
    ${editableTaskBlock(1,'ticket','Ticketing System Support','Log a ticket you handled today','ticketing','No ticket was submitted today.')}
    ${editableTaskBlock(2,'mail','Email Issue Resolution','Bounce-back / unable-to-send fixes','email','No email issue request came in today.')}
    ${thu ? `<div class="thu-banner">${icon('calendar')} It's Thursday — the IT Awareness infographic is due today.</div>` : ''}
    ${editableInfographicBlock()}
    <div class="save-bar">
      <button class="btn btn-ghost" data-action="reset-draft">Discard Changes</button>
      <button class="btn btn-primary" data-action="save-daily">${icon('check2')} Save Daily Log</button>
    </div>
  `;
}
function editableTaskBlock(num, iconName, title, sub, key, quickRemark){
  const d = state.draft[key];
  const mode = d.mode;
  return `
  <div class="task-block">
    <div class="task-block-head"><div class="task-num">${num}</div><div><div class="task-block-title">${title}</div><div class="task-block-sub">${sub}</div></div></div>
    <div class="mode-toggle">
      <button type="button" class="mode-btn ${mode==='photo'?'active':''}" data-action="set-mode" data-key="${key}" data-mode="photo">${icon('camera')} Upload Photo</button>
      <button type="button" class="mode-btn ${mode==='remark'?'active':''}" data-action="set-mode" data-key="${key}" data-mode="remark">${icon('note')} Write Remark</button>
    </div>
    ${mode==='photo' ? photoField(key, d.photo) : ''}
    ${mode==='remark' ? `
      <textarea data-bind="${key}.remark" placeholder="Describe what was handled, or note that nothing came in today...">${escapeHtml(d.remark||'')}</textarea>
      <button type="button" class="quick-btn" data-action="quick-remark" data-key="${key}" data-text="${escapeHtml(quickRemark)}">Use: "${quickRemark}"</button>
    ` : ''}
    ${!mode ? `<div class="empty-state">${icon('arrow')}<div>Choose how you'd like to log this task.</div></div>` : ''}
  </div>`;
}
function photoField(key, photo){
  if(photo){
    return `<div class="photo-preview"><img src="${photo}"><button type="button" class="photo-remove" data-action="remove-photo" data-key="${key}">${icon('x')}</button></div>`;
  }
  return `
    <label class="dropzone" style="display:block">
      ${icon('camera')}
      <p>Tap to upload a photo of the ticket</p>
      <span>JPG or PNG</span>
      <input type="file" accept="image/*" data-photo-input="${key}" style="display:none">
    </label>`;
}
function editableInfographicBlock(){
  const it = state.draft.infographic.items;
  const n = [it.review,it.design,it.upload].filter(Boolean).length;
  const rows = [
    ['review','Reviewed the IT Updates sheet','Content shared by the IT Supervisor'],
    ['design','Designed the infographic in Canva','Clear, professional, on-brand'],
    ['upload','Uploaded before Thursday deadline','Posted to the team channel'],
  ];
  return `
  <div class="task-block">
    <div class="task-block-head"><div class="task-num">3</div><div><div class="task-block-title">IT Awareness Infographic</div><div class="task-block-sub">Weekly checklist — relevant every Thursday</div></div></div>
    ${rows.map(([k,label,s])=>`
      <div class="check-row" data-action="toggle-check" data-key="${k}" style="cursor:pointer">
        <div class="checkbox ${it[k]?'checked':''}">${it[k]?icon('check2'):''}</div>
        <div><div class="check-label">${label}</div><div class="check-sub">${s}</div></div>
      </div>`).join('')}
    <div class="progress-bar"><div style="width:${(n/3*100)}%"></div></div>
  </div>`;
}

/* ============================= ASSIGNED TASKS PAGE ============================= */
async function renderTasksPage(container){
  const isSup = state.user.role==='supervisor';
  const myTasks = isSup ? state.tasks : state.tasks.filter(t=>t.intern===state.user.name);
  const filtered = state.taskFilter==='all' ? myTasks : myTasks.filter(t=>t.status===state.taskFilter);
  filtered.sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));

  container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Additional Tasks</div><div class="page-title">Assigned Tasks</div><div class="page-desc">${isSup ? 'Assign extra work and track completion.' : 'Tasks your supervisor has assigned to you.'}</div></div>
      ${isSup ? `<button class="btn btn-primary" data-action="open-assign-modal">${icon('plus')} Assign Task</button>` : ''}
    </div>
    <div class="toolbar">
      <div class="seg">
        <button class="${state.taskFilter==='all'?'active':''}" data-action="set-task-filter" data-f="all">All</button>
        <button class="${state.taskFilter==='pending'?'active':''}" data-action="set-task-filter" data-f="pending">Pending</button>
        <button class="${state.taskFilter==='done'?'active':''}" data-action="set-task-filter" data-f="done">Done</button>
      </div>
    </div>
    <div id="taskList">
      ${filtered.length ? filtered.map(t=>taskCard(t,isSup)).join('') : `<div class="empty-state">${icon('bolt')}<div>No tasks here.</div></div>`}
    </div>
  `;
}
function taskCard(t, isSup){
  return `
  <div class="task-card">
    <div>
      <div class="task-card-title">${escapeHtml(t.title)}</div>
      ${t.description ? `<div class="task-card-desc">${escapeHtml(t.description)}</div>` : ''}
      <div class="task-meta">
        ${isSup ? `<span class="meta-chip">${icon('users')} ${escapeHtml(t.intern)}</span>` : ''}
        ${t.dueDate ? `<span class="meta-chip">${icon('calendar')} Due ${fmtDate(t.dueDate)}</span>` : ''}
        ${t.status==='done' && t.completedAt ? `<span class="meta-chip">${icon('clock')} Completed ${fmtDate(t.completedAt)}</span>` : ''}
      </div>
      ${t.status==='done' && (t.proofRemark||t.proofPhoto) ? `
        <div style="margin-top:10px">
          ${t.proofPhoto ? `<div class="photo-preview" style="max-width:260px"><img src="${t.proofPhoto}"></div>` : ''}
          ${t.proofRemark ? `<div style="font-size:12px;color:var(--text-dim);margin-top:6px">${escapeHtml(t.proofRemark)}</div>` : ''}
        </div>` : ''}
    </div>
    <div class="task-card-actions">
      <span class="pill ${t.status==='done'?'pill-green':'pill-amber'}">${t.status==='done'?'Done':'Pending'}</span>
      ${!isSup && t.status==='pending' ? `<button class="btn btn-soft btn-sm" data-action="open-complete-modal" data-id="${t.id}">Mark as Done</button>` : ''}
      ${isSup ? `<button class="btn btn-danger-soft btn-sm" data-action="delete-task" data-id="${t.id}">${icon('trash')}</button>` : ''}
    </div>
  </div>`;
}

/* ============================= TEAM PAGE ============================= */
function renderTeamPage(container){
  container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Team</div><div class="page-title">Interns</div><div class="page-desc">Manage who can log daily tasks.</div></div>
      <button class="btn btn-primary" data-action="open-add-intern">${icon('plus')} Add Intern</button>
    </div>
    <div class="section-card">
      ${state.interns.length ? `
        <table>
          <thead><tr><th>Name</th><th>Action</th></tr></thead>
          <tbody>${state.interns.map(n=>`
            <tr>
              <td><span class="id-link">${escapeHtml(n)}</span></td>
              <td><button class="btn btn-danger-soft btn-sm" data-action="remove-intern" data-name="${escapeHtml(n)}">${icon('trash')} Remove</button></td>
            </tr>`).join('')}
          </tbody>
        </table>` :
      `<div class="empty-state">${icon('users')}<div>No interns yet. Add one above.</div></div>`}
    </div>
  `;
}

/* ============================= MODALS ============================= */
function openModal(html){
  state.modalOpen = true;
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay">${html}</div>`;
}
function closeModal(){
  state.modalOpen = false;
  document.getElementById('modalRoot').innerHTML = '';
}

function openAssignModal(){
  const opts = state.interns.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
  openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Assign Task</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-assign">
        <div class="field"><label class="field-label">Intern</label><select name="intern">${opts}</select></div>
        <div class="field"><label class="field-label">Task Title</label><input type="text" name="title" placeholder="e.g. Update inventory sheet" required></div>
        <div class="field"><label class="field-label">Description (optional)</label><textarea name="desc" placeholder="More details…"></textarea></div>
        <div class="field"><label class="field-label">Due Date (optional)</label><input type="date" name="due"></div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('plus')} Assign</button></div>
      </form>
    </div>`);
}

function openCompleteModal(id){
  openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Mark Task as Done</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-complete" data-id="${id}">
        <div class="field"><label class="field-label">Proof Remark (optional)</label><textarea name="remark" placeholder="How was it completed?"></textarea></div>
        <div class="field"><label class="field-label">Proof Photo (optional)</label>
          <label class="dropzone" style="display:block">
            ${icon('camera')}<p>Upload a screenshot or photo</p><span>JPG or PNG</span>
            <input type="file" accept="image/*" id="proofPhotoInput" style="display:none">
          </label>
          <div id="proofPhotoPreview"></div>
        </div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('check2')} Mark Done</button></div>
      </form>
    </div>`);
  document.getElementById('proofPhotoInput').addEventListener('change', async e=>{
    const file = e.target.files[0];
    if(!file) return;
    const url = await fileToCompressedDataURL(file);
    document.getElementById('proofPhotoPreview').innerHTML = `<div class="photo-preview" style="margin-top:8px"><img src="${url}"><button type="button" class="photo-remove" id="clearProofPhoto">${icon('x')}</button></div>`;
    document.getElementById('clearProofPhoto').onclick = ()=>{ document.getElementById('proofPhotoPreview').innerHTML=''; document.getElementById('proofPhotoInput').value=''; };
  });
}

function openAddInternModal(){
  openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Add Intern</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-add-intern">
        <div class="field"><label class="field-label">Full Name</label><input type="text" name="name" placeholder="e.g. Maria Santos" required></div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('plus')} Add</button></div>
      </form>
    </div>`);
}

/* ============================= GLOBAL EVENT DELEGATION ============================= */
document.addEventListener('click', async e=>{
  // nav
  const navBtn = e.target.closest('[data-action="nav"]');
  if(navBtn){ navigate(navBtn.dataset.view); return; }

  // theme
  if(e.target.closest('[data-action="toggle-theme"]')){ document.body.classList.toggle('light'); return; }

  // logout — properly signs out from Supabase then shows login
  if(e.target.closest('[data-action="logout"]')){
    await window.db.auth.signOut();   // clears Supabase JWT from localStorage
    state.user  = null;
    state.tasks = [];
    // onAuthStateChange fires SIGNED_OUT → showLogin() is called there too,
    // but we do it proactively for zero-flash UX.
    showLogin();
    return;
  }

  // modal actions
  if(e.target.closest('[data-action="close-modal"]')){ closeModal(); return; }
  if(e.target.closest('[data-action="open-assign-modal"]')){ openAssignModal(); return; }
  if(e.target.closest('[data-action="open-add-intern"]')){ openAddInternModal(); return; }

  const completeBtn = e.target.closest('[data-action="open-complete-modal"]');
  if(completeBtn){ openCompleteModal(completeBtn.dataset.id); return; }

  // delete task
  const delBtn = e.target.closest('[data-action="delete-task"]');
  if(delBtn){
    state.tasks = state.tasks.filter(t=>t.id!==delBtn.dataset.id);
    await sSet('tasks', state.tasks, true);
    renderTasksPage(document.getElementById('mainContent'));
    toast('Task removed.');
    return;
  }

  // remove intern
  const remBtn = e.target.closest('[data-action="remove-intern"]');
  if(remBtn){
    state.interns = state.interns.filter(n=>n!==remBtn.dataset.name);
    await sSet('interns', state.interns, true);
    renderTeamPage(document.getElementById('mainContent'));
    toast('Intern removed.');
    return;
  }

  // daily log mode toggle
  const modeBtn = e.target.closest('[data-action="set-mode"]');
  if(modeBtn){
    const { key, mode } = modeBtn.dataset;
    state.draft[key].mode = state.draft[key].mode===mode ? null : mode;
    renderDraft(); return;
  }

  // remove photo
  const rmPhoto = e.target.closest('[data-action="remove-photo"]');
  if(rmPhoto){ state.draft[rmPhoto.dataset.key].photo=null; renderDraft(); return; }

  // quick remark
  const qb = e.target.closest('[data-action="quick-remark"]');
  if(qb){
    state.draft[qb.dataset.key].remark = qb.dataset.text;
    const ta = document.querySelector(`[data-bind="${qb.dataset.key}.remark"]`);
    if(ta) ta.value = qb.dataset.text;
    return;
  }

  // infographic checkbox
  const checkRow = e.target.closest('[data-action="toggle-check"]');
  if(checkRow){
    const k = checkRow.dataset.key;
    state.draft.infographic.items[k] = !state.draft.infographic.items[k];
    renderDraft(); return;
  }

  // reset draft
  if(e.target.closest('[data-action="reset-draft"]')){ state.draft = newDailyDraft(); renderDraft(); return; }

  // save daily log
  if(e.target.closest('[data-action="save-daily"]')){
    // sync textarea content into state before saving
    document.querySelectorAll('[data-bind]').forEach(el=>{
      const [k,f] = el.dataset.bind.split('.');
      if(state.draft[k]) state.draft[k][f] = el.value;
    });
    state.draft.completedAt = new Date().toISOString();
    await sSet('daily:'+state.user.name+':'+state.dateSel, state.draft, true);
    renderDraft();
    toast('Daily log saved!');
    return;
  }

  // task filter
  const filterBtn = e.target.closest('[data-action="set-task-filter"]');
  if(filterBtn){
    state.taskFilter = filterBtn.dataset.f;
    renderTasksPage(document.getElementById('mainContent')); return;
  }
});

/* ============================= FILE INPUTS ============================= */
document.addEventListener('change', async e=>{
  const photoInput = e.target.closest('[data-photo-input]');
  if(photoInput && photoInput.files[0]){
    const key = photoInput.dataset.photoInput;
    const url = await fileToCompressedDataURL(photoInput.files[0]);
    state.draft[key].photo = url;
    renderDraft();
    return;
  }
});

/* ============================= FORM SUBMISSIONS ============================= */
document.addEventListener('submit', async e=>{
  e.preventDefault();
  const form = e.target;

  if(form.dataset.action === 'submit-assign'){
    const t = {
      id: uid(), intern: form.intern.value, title: form.title.value.trim(),
      description: form.desc.value.trim(), dueDate: form.due.value || null,
      status: 'pending', createdAt: Date.now(),
    };
    state.tasks.push(t);
    await sSet('tasks', state.tasks, true);
    closeModal();
    renderTasksPage(document.getElementById('mainContent'));
    toast('Task assigned!');
    return;
  }

  if(form.dataset.action === 'submit-complete'){
    const id = form.dataset.id;
    const remark = form.remark.value.trim();
    const previewImg = document.querySelector('#proofPhotoPreview img');
    const photo = previewImg ? previewImg.src : null;
    state.tasks = state.tasks.map(t=> t.id===id
      ? {...t, status:'done', proofRemark:remark, proofPhoto:photo, completedAt:todayStr()}
      : t);
    await sSet('tasks', state.tasks, true);
    closeModal();
    renderTasksPage(document.getElementById('mainContent'));
    toast('Task marked as done!');
    return;
  }

  if(form.dataset.action === 'submit-add-intern'){
    const name = form.name.value.trim();
    if(!name) return;
    if(!state.interns.includes(name)){
      state.interns.push(name);
      await sSet('interns', state.interns, true);
    }
    closeModal();
    renderTeamPage(document.getElementById('mainContent'));
    toast('Intern added!');
    return;
  }
});
</script>
