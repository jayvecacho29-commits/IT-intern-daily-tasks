<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intern Tracker · IT Department</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════
     INTERN TRACKER — Neumorphic Dark · Indigo→Blue Gradient
     Font: Geist (SaaS/dev) · Accent: #6366f1 → #3b82f6
  ═══════════════════════════════════════════════════════════════ */

    :root {
      /* ── Surfaces ── */
      --bg: #111118;
      --bg-sidebar: #0e0e15;
      --bg-card: #16161f;
      --bg-card-hover: #1b1b27;
      --bg-input: #111118;
      --border: #252535;
      --border-soft: #1d1d2c;

      /* ── Typography ── */
      --text: #e4e4f0;
      --text-dim: #8686a4;
      --text-faint: #4e4e6a;

      /* ── Accent: Indigo → Blue ── */
      --blue: #3b82f6;
      --indigo: #6366f1;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
      --accent-glow: rgba(99, 102, 241, .28);
      --blue-dim: rgba(99, 102, 241, .12);
      --blue-line: rgba(99, 102, 241, .36);

      /* ── Semantic colors ── */
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, .13);
      --amber: #f59e0b;
      --amber-dim: rgba(245, 158, 11, .13);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, .13);
      --purple: #a855f7;
      --purple-dim: rgba(168, 85, 247, .13);

      /* ── Neumorphic shadows (dark) ── */
      --neu: -4px -4px 9px rgba(255, 255, 255, .028), 5px 5px 14px rgba(0, 0, 0, .58);
      --neu-sm: -2px -2px 5px rgba(255, 255, 255, .022), 3px 3px 8px rgba(0, 0, 0, .52);
      --neu-inset: inset -2px -2px 5px rgba(255, 255, 255, .022), inset 3px 3px 8px rgba(0, 0, 0, .55);
      --neu-btn: -2px -2px 4px rgba(255, 255, 255, .03), 3px 3px 9px rgba(0, 0, 0, .62);
      --shadow: var(--neu);

      /* ── Shape ── */
      --radius: 16px;
      --radius-sm: 11px;
    }

    body.light {
      --bg: #eaedf4;
      --bg-sidebar: #e2e6f0;
      --bg-card: #eaedf4;
      --bg-card-hover: #f0f3fa;
      --bg-input: #e2e6f0;
      --border: #d0d4e8;
      --border-soft: #d8dcec;
      --text: #14142a;
      --text-dim: #5e5e7c;
      --text-faint: #9494b0;
      --blue-dim: rgba(99, 102, 241, .10);
      --green-dim: rgba(34, 197, 94, .10);
      --amber-dim: rgba(245, 158, 11, .10);
      --red-dim: rgba(239, 68, 68, .10);
      --purple-dim: rgba(168, 85, 247, .10);
      --neu: -3px -3px 7px rgba(255, 255, 255, .75), 4px 4px 10px rgba(155, 160, 210, .28);
      --neu-sm: -2px -2px 4px rgba(255, 255, 255, .65), 3px 3px 7px rgba(155, 160, 210, .22);
      --neu-inset: inset -2px -2px 5px rgba(255, 255, 255, .7), inset 3px 3px 7px rgba(155, 160, 210, .25);
      --shadow: var(--neu);
    }

    /* ── RESET ─────────────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .mono {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      width: auto;
      max-width: none;
      flex: none;
    }

    input,
    textarea,
    select {
      font-family: inherit;
    }

    ::placeholder {
      color: var(--text-faint);
    }

    /* ── LOGIN SCREEN ───────────────────────────────────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 15% 10%, rgba(99, 102, 241, .09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(59, 130, 246, .09) 0%, transparent 60%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border-radius: 24px;
      padding: 38px 34px;
      box-shadow: var(--neu);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .5px;
      flex-shrink: 0;
      box-shadow: 0 4px 18px var(--accent-glow), var(--neu-btn);
    }

    .login-title {
      font-size: 15px;
      font-weight: 700;
    }

    .login-sub {
      font-size: 10.5px;
      color: var(--text-dim);
      letter-spacing: .09em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .login-heading {
      font-size: 24px;
      font-weight: 800;
      margin: 4px 0 7px;
      letter-spacing: -.02em;
    }

    .login-desc {
      font-size: 13.5px;
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 1.55;
    }

    .role-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      background: var(--bg-input);
      border-radius: 13px;
      padding: 4px;
      box-shadow: var(--neu-inset);
    }

    .role-tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      border: none;
      background: transparent;
      transition: .2s;
    }

    .role-tab.active {
      background: var(--accent-gradient);
      color: #fff;
      box-shadow: var(--neu-btn), 0 2px 10px var(--accent-glow);
    }

    /* ── FORM ELEMENTS ──────────────────────────────────────────────── */
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 8px;
      display: block;
    }

    select,
    input[type=text],
    input[type=email],
    input[type=password],
    input[type=date],
    textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid transparent;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      font-size: 13.5px;
      outline: none;
      box-shadow: var(--neu-inset);
      transition: border-color .2s, box-shadow .2s;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--indigo);
      box-shadow: var(--neu-inset), 0 0 0 3px rgba(99, 102, 241, .13);
    }

    /* ── BUTTONS ────────────────────────────────────────────────────── */
    .btn {
      box-sizing: border-box;
      border: none;
      border-radius: var(--radius-sm);
      min-height: 40px;
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      transition: .18s;
    }

    .btn-full {
      display: flex;
      width: 100%;
      min-height: 42px;
      margin-top: 6px;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: #fff;
      box-shadow: var(--neu-btn), 0 4px 16px var(--accent-glow);
    }

    .btn-primary:hover {
      box-shadow: var(--neu-btn), 0 6px 22px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: var(--neu-inset);
    }

    .btn-ghost {
      background: var(--bg-card);
      color: var(--text-dim);
      border: 1.5px solid var(--border);
      box-shadow: var(--neu-sm);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--indigo);
    }

    .btn-soft {
      background: var(--blue-dim);
      color: var(--indigo);
      box-shadow: var(--neu-sm);
    }

    .btn-soft:hover {
      background: var(--blue-line);
    }

    .btn-danger-soft {
      background: var(--red-dim);
      color: var(--red);
      box-shadow: var(--neu-sm);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      min-height: 32px;
    }

    .hint {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 8px;
      line-height: 1.5;
    }

    .err {
      font-size: 12px;
      color: var(--red);
      margin-top: 8px;
    }

    /* ── APP SHELL ──────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      box-shadow: 4px 0 28px rgba(0, 0, 0, .45);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 10px 26px;
    }

    .menu-eyebrow {
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 700;
      padding: 0 12px;
      margin-bottom: 6px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 13px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-dim);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: .18s;
    }

    .nav-item svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--blue-dim);
      color: var(--indigo);
      box-shadow: var(--neu-sm);
    }

    .nav-item .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-gradient);
      margin-left: auto;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    .sidebar-spacer {
      flex: 1;
    }

    .sidebar-foot {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--purple-dim);
      color: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12.5px;
      flex-shrink: 0;
      box-shadow: var(--neu-sm);
    }

    .user-card.super .avatar {
      background: var(--blue-dim);
      color: var(--indigo);
    }

    .user-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .user-role {
      font-size: 10px;
      color: var(--indigo);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
    }

    .main {
      margin-left: 260px;
      flex: 1;
      padding: 34px 40px 64px;
      max-width: 1200px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--indigo);
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 6px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .page-desc {
      font-size: 13.5px;
      color: var(--text-dim);
      margin-top: 5px;
    }

    /* ── CARDS / STATS ──────────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--neu);
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .stat-label {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .icon-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--neu-sm);
    }

    .icon-badge svg {
      width: 18px;
      height: 18px;
    }

    .ib-blue {
      background: var(--blue-dim);
      color: var(--indigo);
    }

    .ib-green {
      background: var(--green-dim);
      color: var(--green);
    }

    .ib-amber {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .ib-red {
      background: var(--red-dim);
      color: var(--red);
    }

    .ib-purple {
      background: var(--purple-dim);
      color: var(--purple);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--neu);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14.5px;
      font-weight: 700;
    }

    .section-sub {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    .link-more {
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-soft);
    }

    td {
      padding: 12px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-soft);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .id-link {
      color: var(--indigo);
      font-weight: 700;
      font-size: 12.5px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .pill-blue {
      background: var(--blue-dim);
      color: var(--indigo);
      border-color: var(--blue-line);
    }

    .pill-green {
      background: var(--green-dim);
      color: var(--green);
    }

    .pill-amber {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .pill-red {
      background: var(--red-dim);
      color: var(--red);
    }

    .pill-gray {
      background: var(--bg-input);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .empty-state {
      padding: 32px 12px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    .empty-state svg {
      width: 28px;
      height: 28px;
      margin-bottom: 10px;
      opacity: .35;
    }

    /* ── TOOLBAR / TABS ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar select,
    .toolbar input[type=date] {
      width: auto;
      min-width: 150px;
    }

    .seg {
      display: flex;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
      box-shadow: var(--neu-inset);
    }

    .seg button {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12.5px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 9px;
      transition: .18s;
    }

    .seg button.active {
      background: var(--accent-gradient);
      color: #fff;
      box-shadow: var(--neu-btn);
    }

    /* ── DAILY TASK BLOCKS ──────────────────────────────────────────── */
    .task-block {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 14px;
      box-shadow: var(--neu);
    }

    .task-block-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .task-num {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--blue-dim);
      color: var(--indigo);
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--neu-sm);
    }

    .task-block-title {
      font-size: 14.5px;
      font-weight: 700;
    }

    .task-block-sub {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 1px;
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--bg-input);
      color: var(--text-dim);
      font-size: 12.5px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: var(--neu-sm);
      transition: .18s;
    }

    .mode-btn svg {
      width: 14px;
      height: 14px;
    }

    .mode-btn.active {
      box-shadow: var(--neu-inset);
      color: var(--indigo);
    }

    textarea {
      min-height: 66px;
      resize: vertical;
    }

    .quick-btn {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-input);
      border: none;
      padding: 5px 10px;
      border-radius: 99px;
      margin-top: 8px;
      box-shadow: var(--neu-sm);
      transition: .15s;
    }

    .quick-btn:hover {
      color: var(--text);
    }

    .dropzone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 24px 14px;
      text-align: center;
      background: var(--bg-input);
      cursor: pointer;
      box-shadow: var(--neu-inset);
    }

    .dropzone svg {
      width: 22px;
      height: 22px;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    .dropzone p {
      font-size: 12.5px;
      color: var(--text-dim);
      margin: 0;
    }

    .dropzone span {
      font-size: 11px;
      color: var(--text-faint);
    }

    .photo-preview {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--neu-sm);
    }

    .photo-preview img {
      width: 100%;
      max-height: 230px;
      object-fit: cover;
      display: block;
    }

    .photo-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(10, 10, 20, .8);
      color: #fff;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-remove svg {
      width: 13px;
      height: 13px;
    }

    .check-row {

    /* ============================= AUTH HELPERS ============================= */
    /**
     * Fetch the authenticated user's profile row from public.profiles.
     * Returns null if not authenticated or no matching profile.
     */
    async function fetchProfile() {
      const { data: { user } } = await window.db.auth.getUser();
      if (!user) return null;
      const { data, error } = await window.db
        .from('profiles')
        .select('id, full_name, role')
        .eq('id', user.id)
        .maybeSingle();
      if (error) { console.error('fetchProfile error:', error); return null; }
      return data;   // { id, full_name, role }
    }

    /**
     * After a Google OAuth sign-in the user may not have a profile row yet
     * (first login). Create one with role='intern' so the app can continue.
     * The supervisor must already have a profile row (created manually or via
     * the Supabase dashboard).
     */
    async function ensureProfile(supabaseUser, fullName) {
      const existing = await fetchProfile();
      if (existing) return existing;
      // First-time Google sign-in → create a default 'intern' profile
      const name = fullName
        || supabaseUser.user_metadata?.full_name
        || supabaseUser.email?.split('@')[0]
        || 'Unknown';
      const { data, error } = await window.db
        .from('profiles')
        .insert({ id: supabaseUser.id, full_name: name, role: 'intern' })
        .select('id, full_name, role')
        .single();
      if (error) { console.error('ensureProfile insert error:', error); return null; }
      return data;
    }

    /* ============================= DEPARTMENTS ============================= */
    const DEPARTMENTS = ['Marketing', 'Litigations', 'IT'];

    /* ============================= STATE ============================= */
    const state = {
      user: null,            // {id, name, role}
      interns: [],
      internDepts: {},       // { internName: 'IT' | 'Marketing' | 'Litigations' }
      tasks: [],
      view: 'dashboard',
      dateSel: todayStr(),
      deptFilter: '',        // '' = All departments
      logInternSel: null,
      draft: null,
      taskFilter: 'all',
      modalOpen: false,
      loading: true,
    };


    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function newDailyDraft() {
      return {
        ticketing: { mode: null, remark: '', photo: null },
        email: { mode: null, remark: '', photo: null },
        infographic: { items: { review: false, design: false, upload: false } },
        completedAt: null,
      };
    }
    let dailyRolloverTimer;
    function scheduleDailyRollover() {
      clearTimeout(dailyRolloverTimer);
      const nextDay = new Date();
      nextDay.setHours(24, 0, 2, 0);
      dailyRolloverTimer = setTimeout(async () => {
        if (state.user && state.user.role === 'intern') {
          state.dateSel = todayStr();
          if (state.view === 'dailylog') await loadDraftAndRender();
        }
        scheduleDailyRollover();
      }, nextDay - new Date());
    }
    function isThursday(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).getDay() === 4;
    }
    function fmtDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function initials(name) {
      return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    /* ============================= TOAST ============================= */
    function toast(msg, isError = false) {
      const root = document.getElementById('toastRoot');
      const el = document.createElement('div');
      el.className = 'toast' + (isError ? ' error' : '');
      el.textContent = msg;

      setTimeout(() => el.remove(), 2600);

    /* ============================= IMAGE COMPRESSION ============================= */
    function fileToCompressedDataURL(file, maxW = 760, quality = 0.62) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('read failed'));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('image decode failed'));
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    /* ============================= INTERN SYNC (Supabase: interns table) ============================= */
    // NOTE: password is intentionally NOT selected here — it's only fetched
    // during the login check, and never kept in app state or the roster list.
    async function loadInterns() {
      try {
        const { data, error } = await window.db
          .from('interns')
          .select('name, department')
          .order('name', { ascending: true });
        if (!error && data) {
          state.interns = data.map(i => i.name);
          state.internDepts = {};
          data.forEach(i => { state.internDepts[i.name] = i.department; });
        } else if (error) {
          console.warn('Failed to load interns from Supabase', error);
        }
      } catch (e) {
        console.warn('Failed to load interns from Supabase', e);
      }
    }

    /* ============================= TASKS SYNC (Supabase: tasks table) ============================= */
    async function loadTasks() {
      try {
        let query = window.db.from('tasks').select('*').order('created_at', { ascending: false });
        if (state.user.role !== 'supervisor') query = query.eq('intern_name', state.user.name);
        const { data, error } = await query;
        if (!error && data) {
          state.tasks = data.map(rowToTask);
        } else if (error) {
          console.warn('Failed to load tasks from Supabase', error);
        }
      } catch (e) {
        console.warn('Failed to load tasks from Supabase', e);
      }
    }
    function rowToTask(row) {
      return {
        id: row.id,
        intern: row.intern_name,
        title: row.title,
        description: row.description || '',
        dueDate: row.due_date,
        status: row.status,
        proofRemark: row.proof_remark,
        proofPhoto: row.proof_photo,
        completedAt: row.completed_at,
        createdAt: row.created_at ? new Date(row.created_at).getTime() : 0,
      };
    }

    /* ============================= DAILY LOGS SYNC (Supabase: daily_logs table) ============================= */
    function rowToDaily(row) {
      if (!row) return null;
      return {
        ticketing: row.ticketing || { mode: null, remark: '', photo: null },
        email: row.email || { mode: null, remark: '', photo: null },
        infographic: row.infographic || { items: { review: false, design: false, upload: false } },
        completedAt: row.completed_at,
      };
    }
    async function getDailyLog(internName, dateStr) {
      const { data, error } = await window.db
        .from('daily_logs')
        .select('*')
        .eq('intern_name', internName)
        .eq('log_date', dateStr)
        .maybeSingle();
      if (error) { console.warn('Failed to load daily log', error); return null; }
      return rowToDaily(data);
    }
    async function saveDailyLog(internName, dateStr, draft) {
      const { error } = await window.db
        .from('daily_logs')
        .upsert({
          intern_name: internName,
          log_date: dateStr,
          ticketing: draft.ticketing,
          email: draft.email,
          infographic: draft.infographic,
          completed_at: draft.completedAt,
        }, { onConflict: 'intern_name,log_date' });
      if (error) { console.error('Failed to save daily log', error); return false; }
      return true;
    }
    // Batch-fetch every daily log for a given date (used by the dashboard)
    async function getDailyLogsForDate(dateStr, names) {
      let query = window.db.from('daily_logs').select('*').eq('log_date', dateStr);
      if (names && names.length) query = query.in('intern_name', names);
      const { data, error } = await query;
      if (error) { console.warn('Failed to load daily logs for date', error); return []; }
      return data.map(row => ({ name: row.intern_name, e: rowToDaily(row) }));
    }

    /* ============================= BOOT ============================= */
    async function boot() {
      // Fetch fresh interns from Supabase on startup
      await loadInterns();

      // Let Supabase restore any persisted session from localStorage first.
      // getSession() is sync-fast when the JWT is still valid.
      const { data: { session } } = await window.db.auth.getSession();

      if (session) {
        // There is a live Supabase session — use it directly.
        await handleSession(session);
      } else {
        // No active session → show login.
        showLogin();
      }

      // React to future auth events (OAuth callback, token refresh, sign-out)
      window.db.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          await handleSession(session);
        } else if (event === 'SIGNED_OUT') {
          state.user = null;
          showLogin();
        } else if (event === 'TOKEN_REFRESHED' && session) {
          // Token was silently refreshed — nothing to do, session remains valid.
        }
      });
    }

    /**
     * Called whenever we have a confirmed Supabase session.
     * Resolves the profile row and then bootstraps the app.
     */
    async function handleSession(session) {
      await loadInterns();
      const profile = await fetchProfile();
      if (!profile) {
        // Could be a first-time Google sign-in; try to create a profile row.
        const created = await ensureProfile(session.user);
        if (!created) {
          toast('Could not load your profile. Contact an administrator.', true);
          await window.db.auth.signOut();
          return;
        }
        state.user = { id: created.id, name: created.full_name, role: created.role };
      } else {
        state.user = { id: profile.id, name: profile.full_name, role: profile.role };
      }

      if (state.user.role === 'supervisor') {
        state.logInternSel = state.interns[0] || null;
      } else {
        state.logInternSel = state.user.name;
      }
      await loadTasks();
      showApp();
    }

    boot();

    /* ============================= LOGIN SCREEN ============================= */
    let loginRole = 'intern';

    function showLogin() {
      document.getElementById('appShell').style.display = 'none';
      const root = document.getElementById('loginScreen');
      root.style.display = 'flex';
      root.innerHTML = `
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-badge">IT</div>

      <div class="role-tabs">

        <button class="role-tab ${loginRole === 'supervisor' ? 'active' : ''}" data-action="set-login-role" data-role="supervisor">IT Supervisor</button>
      </div>
      ${loginRole === 'intern' ? renderInternLogin() : renderSupervisorLogin()}
    </div>
  `;
    }

    function renderInternLogin() {
      // No Google OAuth for interns — name + password only.
      const opts = state.interns.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
      const deptOpts = DEPARTMENTS.map(d => `<option value="${d}">${d}</option>`).join('');
      return `
    <form data-action="login-intern">
      <div class="field">

    function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    /* ============================= LOGIN EVENTS ============================= */
    // Show dept field when user types a new name
    document.getElementById('loginScreen').addEventListener('input', e => {
      if (e.target.name === 'newName') {
        const deptField = document.getElementById('deptField');
        if (deptField) deptField.style.display = e.target.value.trim() ? 'block' : 'none';
      }
    });

    document.getElementById('loginScreen').addEventListener('click', e => {
      const roleBtn = e.target.closest('[data-action="set-login-role"]');
      if (roleBtn) { loginRole = roleBtn.dataset.role; showLogin(); }

      const googleBtn = e.target.closest('[data-action="login-google"]');
      if (googleBtn) loginWithGoogle();
    });

    document.getElementById('loginScreen').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;

      if (form.dataset.action === 'login-intern') {
        const existing = form.existing.value;
        const newName = form.newName.value.trim();
        const password = form.password.value;
        const deptSel = form.department ? form.department.value : '';

        // Must provide either a selected name or a typed name
        let name = existing || newName;
        if (!name) { toast('Please select your name or type a new one.', true); return; }
        if (!password) { toast('Please enter your password.', true); return; }

        if (existing && !newName) {
          // ── Returning intern: verify password stored in the interns table ──
          const { data: row, error: fetchErr } = await window.db
            .from('interns').select('password').eq('name', existing).maybeSingle();
          if (fetchErr) { toast('Could not verify your account. Try again.', true); return; }
          if (!row || !row.password) {
            // First time logging in with a name that was added by a supervisor
            // (no password set yet) → treat this login as the password-setup step.
            const { error: setErr } = await window.db.from('interns').update({ password }).eq('name', existing);
            if (setErr) { toast('Could not set your password.', true); return; }
            toast('Password set for your account. Welcome!');
          } else if (row.password !== password) {
            toast('Incorrect password. Try again.', true);
            return;
          }
          name = existing;
        } else {
          // ── New intern: register name + password + department ──────────
          if (!newName) { toast('Please type your full name to register.', true); return; }
          if (!deptSel) { toast('Please select your department.', true); return; }
          if (state.interns.includes(newName)) {
            // Name already exists — verify password instead
            const { data: row, error: fetchErr } = await window.db
              .from('interns').select('password').eq('name', newName).maybeSingle();
            if (fetchErr) { toast('Could not verify your account. Try again.', true); return; }
            if (row && row.password && row.password !== password) {
              toast('That name already exists. Wrong password.', true);
              return;
            }
            if (row && !row.password) {
              // Name exists but no password yet — set it now
              await window.db.from('interns').update({ password }).eq('name', newName);
            }
          } else {
            // Brand-new intern: insert into the interns table
            const { error: insErr } = await window.db
              .from('interns').insert({ name: newName, department: deptSel, password });
            if (insErr) { toast('Could not create your account.', true); return; }
            state.interns.push(newName);
            state.internDepts[newName] = deptSel;
            toast('Account created. Welcome, ' + newName + '!');
          }
          name = newName;
        }

        state.user = { id: null, name, role: 'intern' };
        state.logInternSel = name;
        await loadTasks();
        showApp();

      }
    });

    async function loginWithGoogle() {
      // redirectTo must match an entry in Supabase → Auth → Redirect URLs.
      // For a local HTML file use the file's full URL; for a hosted app use its origin.
      const redirectTo = window.location.href.split('?')[0].split('#')[0];
      const { error } = await window.db.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo,
          queryParams: { access_type: 'offline', prompt: 'select_account' },
        },
      });
      if (error) toast(error.message || 'Google sign-in failed', true);
      // Supabase redirects the browser to Google; on return it fires onAuthStateChange.
    }

      <div class="card stat-card"><div class="stat-top"><div><div class="stat-label">Infographic (Thu)</div><div class="stat-value">${thu ? (infoDone ? 'Done' : 'Pending') : '—'}</div></div><div class="icon-badge ib-amber">${icon('image')}</div></div></div>

      const activityRows = entries.length ? entries.map(({ name, e }) => `

        </div>
        ${entries.length ? `
        <table>
          <thead><tr><th>${state.user.role === 'supervisor' ? 'Intern' : 'Category'}</th><th>Ticketing</th><th>Email</th><th>Infographic</th></tr></thead>

    function statusPill(section) {
      if (!section) return '<span class="pill pill-gray">Not logged</span>';
      if (section.photo) return '<span class="pill pill-green">Ticket photo</span>';
      if ((section.remark || '').trim()) return '<span class="pill pill-blue">Remark</span>';
      return '<span class="pill pill-gray">Not logged</span>';

    function infoPill(info) {
      if (!info) return '<span class="pill pill-gray">Not started</span>';
      const it = info.items || {};
      const n = [it.review, it.design, it.upload].filter(Boolean).length;
      if (n === 3) return '<span class="pill pill-green">Complete</span>';
      if (n > 0) return '<span class="pill pill-amber">' + n + '/3</span>';
      return '<span class="pill pill-gray">Not started</span>';

    async function renderSupervisorDailyLogBody() {

      body.innerHTML = `<div class="empty-state">Loading…</div>`;

    ${readonlyTaskBlock(2, 'mail', 'Email Issue Resolution', 'Bounce-back / send failures resolved', e && e.email)}

    function readonlyTaskBlock(num, iconName, title, sub, section) {
      let body;
      if (!section || (!section.photo && !(section.remark || '').trim())) {
        body = `<div class="empty-state">${icon('note')}<div>Not logged for this day.</div></div>`;

        body = `<div class="photo-preview"><img src="${section.photo}"></div>`;

        body = `<div style="font-size:13px;color:var(--text-dim);background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px">${escapeHtml(section.remark)}</div>`;

      return `<div class="task-block"><div class="task-block-head"><div class="task-num">${num}</div><div><div class="task-block-title">${title}</div><div class="task-block-sub">${sub}</div></div></div>${body}</div>`;
    }
    function readonlyInfographicBlock(info) {
      const it = (info && info.items) || {};

      return `<div class="task-block"><div class="task-block-head"><div class="task-num">3</div><div><div class="task-block-title">IT Awareness Infographic</div><div class="task-block-sub">Thursday weekly checklist</div></div></div>

  </div>`;
    }

    async function renderInternDailyLog(container) {

    async function loadDraftAndRender() {

    function renderDraft() {

    function editableTaskBlock(num, iconName, title, sub, key, quickRemark) {
      const d = state.draft[key];
      const mode = d.mode;
      return `
  <div class="task-block">
    <div class="task-block-head"><div class="task-num">${num}</div><div><div class="task-block-title">${title}</div><div class="task-block-sub">${sub}</div></div></div>

    </div>
    ${mode === 'photo' ? photoField(key, d.photo) : ''}
    ${mode === 'remark' ? `
      <textarea data-bind="${key}.remark" placeholder="Describe what was handled, or note that nothing came in today...">${escapeHtml(d.remark || '')}</textarea>

    ${!mode ? `<div class="empty-state">${icon('arrow')}<div>Choose how you'd like to log this task.</div></div>` : ''}

    function photoField(key, photo) {
      if (photo) {
        return `<div class="photo-preview"><img src="${photo}"><button type="button" class="photo-remove" data-action="remove-photo" data-key="${key}">${icon('x')}</button></div>`;
      }
      return `
    <label class="dropzone" style="display:block">
      ${icon('camera')}
      <p>Tap to upload a photo of the ticket</p>
      <span>JPG or PNG</span>
      <input type="file" accept="image/*" data-photo-input="${key}" style="display:none">
    </label>`;
    }
    function editableInfographicBlock() {
      const it = state.draft.infographic.items;
      const n = [it.review, it.design, it.upload].filter(Boolean).length;
      const rows = [
        ['review', 'Reviewed the IT Updates sheet', 'Content shared by the IT Supervisor'],
        ['design', 'Designed the infographic in Canva', 'Clear, professional, on-brand'],
        ['upload', 'Uploaded before Thursday deadline', 'Posted to the team channel'],
      ];
      return `
  <div class="task-block">
    <div class="task-block-head"><div class="task-num">3</div><div><div class="task-block-title">IT Awareness Infographic</div><div class="task-block-sub">Weekly checklist — relevant every Thursday</div></div></div>
    ${rows.map(([k, label, s]) => `
      <div class="check-row" data-action="toggle-check" data-key="${k}" style="cursor:pointer">
        <div class="checkbox ${it[k] ? 'checked' : ''}">${it[k] ? icon('check2') : ''}</div>
        <div><div class="check-label">${label}</div><div class="check-sub">${s}</div></div>
      </div>`).join('')}
    <div class="progress-bar"><div style="width:${(n / 3 * 100)}%"></div></div>
  </div>`;
    }

    /* ============================= ASSIGNED TASKS PAGE ============================= */
    async function renderTasksPage(container) {
      const isSup = state.user.role === 'supervisor';
      const myTasks = isSup ? state.tasks : state.tasks.filter(t => t.intern === state.user.name);
      const filtered = state.taskFilter === 'all' ? myTasks : myTasks.filter(t => t.status === state.taskFilter);
      filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Additional Tasks</div><div class="page-title">Assigned Tasks</div><div class="page-desc">${isSup ? 'Assign extra work and track completion.' : 'Tasks your supervisor has assigned to you.'}</div></div>
      ${isSup ? `<button class="btn btn-primary" data-action="open-assign-modal">${icon('plus')} Assign Task</button>` : ''}
    </div>
    <div class="toolbar">
      <div class="seg">
        <button class="${state.taskFilter === 'all' ? 'active' : ''}" data-action="set-task-filter" data-f="all">All</button>
        <button class="${state.taskFilter === 'pending' ? 'active' : ''}" data-action="set-task-filter" data-f="pending">Pending</button>
        <button class="${state.taskFilter === 'done' ? 'active' : ''}" data-action="set-task-filter" data-f="done">Done</button>
      </div>
    </div>
    <div id="taskList">
      ${filtered.length ? filtered.map(t => taskCard(t, isSup)).join('') : `<div class="empty-state">${icon('bolt')}<div>No tasks here.</div></div>`}
    </div>
  `;
    }
    function taskCard(t, isSup) {
      return `
  <div class="task-card">
    <div>
      <div class="task-card-title">${escapeHtml(t.title)}</div>
      ${t.description ? `<div class="task-card-desc">${escapeHtml(t.description)}</div>` : ''}
      <div class="task-meta">
        ${isSup ? `<span class="meta-chip">${icon('users')} ${escapeHtml(t.intern)}</span>` : ''}
        ${t.dueDate ? `<span class="meta-chip">${icon('calendar')} Due ${fmtDate(t.dueDate)}</span>` : ''}
        ${t.status === 'done' && t.completedAt ? `<span class="meta-chip">${icon('clock')} Completed ${fmtDate(t.completedAt)}</span>` : ''}
      </div>
      ${t.status === 'done' && (t.proofRemark || t.proofPhoto) ? `
        <div style="margin-top:10px">
          ${t.proofPhoto ? `<div class="photo-preview" style="max-width:260px"><img src="${t.proofPhoto}"></div>` : ''}
          ${t.proofRemark ? `<div style="font-size:12px;color:var(--text-dim);margin-top:6px">${escapeHtml(t.proofRemark)}</div>` : ''}
        </div>` : ''}
    </div>
    <div class="task-card-actions">
      <span class="pill ${t.status === 'done' ? 'pill-green' : 'pill-amber'}">${t.status === 'done' ? 'Done' : 'Pending'}</span>
      ${!isSup && t.status === 'pending' ? `<button class="btn btn-soft btn-sm" data-action="open-complete-modal" data-id="${t.id}">Mark as Done</button>` : ''}
      ${isSup ? `<button class="btn btn-danger-soft btn-sm" data-action="delete-task" data-id="${t.id}">${icon('trash')}</button>` : ''}
    </div>
  </div>`;
    }

    /* ============================= TEAM PAGE ============================= */
    function renderTeamPage(container) {
      container.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Team</div><div class="page-title">Interns</div><div class="page-desc">Manage who can log daily tasks.</div></div>
      <button class="btn btn-primary" data-action="open-add-intern">${icon('plus')} Add Intern</button>
    </div>
    <div class="section-card">
      ${state.interns.length ? `
        <table>
          <thead><tr><th>Name</th><th>Action</th></tr></thead>
          <tbody>${state.interns.map(n => `
            <tr>
              <td><span class="id-link">${escapeHtml(n)}</span></td>
              <td><button class="btn btn-danger-soft btn-sm" data-action="remove-intern" data-name="${escapeHtml(n)}">${icon('trash')} Remove</button></td>
            </tr>`).join('')}
          </tbody>
        </table>` :
          `<div class="empty-state">${icon('users')}<div>No interns yet. Add one above.</div></div>`}
    </div>
  `;
    }

    /* ============================= MODALS ============================= */
    function openModal(html) {
      state.modalOpen = true;
      document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay">${html}</div>`;
    }
    function closeModal() {
      state.modalOpen = false;
      document.getElementById('modalRoot').innerHTML = '';
    }

    function openAssignModal() {
      const opts = state.interns.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
      openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Assign Task</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-assign">
        <div class="field"><label class="field-label">Intern</label><select name="intern">${opts}</select></div>
        <div class="field"><label class="field-label">Task Title</label><input type="text" name="title" placeholder="e.g. Update inventory sheet" required></div>
        <div class="field"><label class="field-label">Description (optional)</label><textarea name="desc" placeholder="More details…"></textarea></div>
        <div class="field"><label class="field-label">Due Date (optional)</label><input type="date" name="due"></div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('plus')} Assign</button></div>
      </form>
    </div>`);
    }

    function openCompleteModal(id) {
      openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Mark Task as Done</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-complete" data-id="${id}">
        <div class="field"><label class="field-label">Proof Remark (optional)</label><textarea name="remark" placeholder="How was it completed?"></textarea></div>
        <div class="field"><label class="field-label">Proof Photo (optional)</label>
          <label class="dropzone" style="display:block">
            ${icon('camera')}<p>Upload a screenshot or photo</p><span>JPG or PNG</span>
            <input type="file" accept="image/*" id="proofPhotoInput" style="display:none">
          </label>
          <div id="proofPhotoPreview"></div>
        </div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('check2')} Mark Done</button></div>
      </form>
    </div>`);
      document.getElementById('proofPhotoInput').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        const url = await fileToCompressedDataURL(file);
        document.getElementById('proofPhotoPreview').innerHTML = `<div class="photo-preview" style="margin-top:8px"><img src="${url}"><button type="button" class="photo-remove" id="clearProofPhoto">${icon('x')}</button></div>`;
        document.getElementById('clearProofPhoto').onclick = () => { document.getElementById('proofPhotoPreview').innerHTML = ''; document.getElementById('proofPhotoInput').value = ''; };
      });
    }

    function openAddInternModal() {
      const deptOpts = DEPARTMENTS.map(d => `<option value="${d}">${d}</option>`).join('');
      openModal(`
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Add Intern</div><button class="modal-close" data-action="close-modal">${icon('x')}</button></div>
      <form data-action="submit-add-intern">
        <div class="field"><label class="field-label">Full Name</label><input type="text" name="name" placeholder="e.g. Maria Santos" required></div>
        <div class="field"><label class="field-label">Department</label><select name="department">${deptOpts}</select></div>
        <div class="save-bar"><button class="btn btn-ghost" type="button" data-action="close-modal">Cancel</button><button class="btn btn-primary" type="submit">${icon('plus')} Add</button></div>
      </form>
    </div>`);
    }

    /* ============================= GLOBAL EVENT DELEGATION ============================= */
    document.addEventListener('click', async e => {
      // nav
      const navBtn = e.target.closest('[data-action="nav"]');
      if (navBtn) { navigate(navBtn.dataset.view); return; }

      // theme
      if (e.target.closest('[data-action="toggle-theme"]')) { document.body.classList.toggle('light'); return; }

      // logout — properly signs out from Supabase then shows login
      if (e.target.closest('[data-action="logout"]')) {
        await window.db.auth.signOut();   // clears Supabase JWT from localStorage
        state.user = null;
        state.tasks = [];
        // onAuthStateChange fires SIGNED_OUT → showLogin() is called there too,
        // but we do it proactively for zero-flash UX.
        showLogin();
        return;
      }

      // modal actions
      if (e.target.closest('[data-action="close-modal"]')) { closeModal(); return; }
      if (e.target.closest('[data-action="open-assign-modal"]')) { openAssignModal(); return; }
      if (e.target.closest('[data-action="open-add-intern"]')) { openAddInternModal(); return; }

      const completeBtn = e.target.closest('[data-action="open-complete-modal"]');
      if (completeBtn) { openCompleteModal(completeBtn.dataset.id); return; }

      // delete task
      const delBtn = e.target.closest('[data-action="delete-task"]');
      if (delBtn) {
        const { error } = await window.db.from('tasks').delete().eq('id', delBtn.dataset.id);
        if (error) { toast('Could not remove task.', true); return; }
        state.tasks = state.tasks.filter(t => t.id !== delBtn.dataset.id);
        renderTasksPage(document.getElementById('mainContent'));
        toast('Task removed.');
        return;
      }

      // remove intern
      const remBtn = e.target.closest('[data-action="remove-intern"]');
      if (remBtn) {
        const { error } = await window.db.from('interns').delete().eq('name', remBtn.dataset.name);
        if (error) { toast('Could not remove intern.', true); return; }
        state.interns = state.interns.filter(n => n !== remBtn.dataset.name);
        renderTeamPage(document.getElementById('mainContent'));
        toast('Intern removed.');
        return;
      }

      // daily log mode toggle
      const modeBtn = e.target.closest('[data-action="set-mode"]');
      if (modeBtn) {
        const { key, mode } = modeBtn.dataset;
        state.draft[key].mode = state.draft[key].mode === mode ? null : mode;
        renderDraft(); return;
      }

      // remove photo
      const rmPhoto = e.target.closest('[data-action="remove-photo"]');
      if (rmPhoto) { state.draft[rmPhoto.dataset.key].photo = null; renderDraft(); return; }

      // quick remark
      const qb = e.target.closest('[data-action="quick-remark"]');
      if (qb) {
        state.draft[qb.dataset.key].remark = qb.dataset.text;
        const ta = document.querySelector(`[data-bind="${qb.dataset.key}.remark"]`);
        if (ta) ta.value = qb.dataset.text;
        return;
      }

      // infographic checkbox
      const checkRow = e.target.closest('[data-action="toggle-check"]');
      if (checkRow) {
        const k = checkRow.dataset.key;
        state.draft.infographic.items[k] = !state.draft.infographic.items[k];
        renderDraft(); return;
      }

      // reset draft
      if (e.target.closest('[data-action="reset-draft"]')) { state.draft = newDailyDraft(); renderDraft(); return; }

      // save daily log
      if (e.target.closest('[data-action="save-daily"]')) {
        // sync textarea content into state before saving
        document.querySelectorAll('[data-bind]').forEach(el => {
          const [k, f] = el.dataset.bind.split('.');
          if (state.draft[k]) state.draft[k][f] = el.value;
        });
        state.draft.completedAt = new Date().toISOString();
        const ok = await saveDailyLog(state.user.name, state.dateSel, state.draft);
        if (!ok) { toast('Could not save daily log. Try again.', true); state.draft.completedAt = null; return; }
        renderDraft();
        toast('Daily log saved!');
        return;
      }

      // task filter
      const filterBtn = e.target.closest('[data-action="set-task-filter"]');
      if (filterBtn) {
        state.taskFilter = filterBtn.dataset.f;
        renderTasksPage(document.getElementById('mainContent')); return;
      }
    });

    /* ============================= FILE INPUTS ============================= */
    document.addEventListener('change', async e => {
      const photoInput = e.target.closest('[data-photo-input]');
      if (photoInput && photoInput.files[0]) {
        const key = photoInput.dataset.photoInput;
        const url = await fileToCompressedDataURL(photoInput.files[0]);
        state.draft[key].photo = url;
        renderDraft();
        return;
      }
    });

    /* ============================= FORM SUBMISSIONS ============================= */
    document.addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;

      if (form.dataset.action === 'submit-assign') {
        const { data, error } = await window.db.from('tasks').insert({
          intern_name: form.intern.value,
          title: form.title.value.trim(),
          description: form.desc.value.trim(),
          due_date: form.due.value || null,
          status: 'pending',
        }).select('*').single();
        if (error) { toast('Could not assign task.', true); return; }
        state.tasks.unshift(rowToTask(data));
        closeModal();
        renderTasksPage(document.getElementById('mainContent'));
        toast('Task assigned!');
        return;
      }

      if (form.dataset.action === 'submit-complete') {
        const id = form.dataset.id;
        const remark = form.remark.value.trim();
        const previewImg = document.querySelector('#proofPhotoPreview img');
        const photo = previewImg ? previewImg.src : null;
        const { error } = await window.db.from('tasks').update({
          status: 'done', proof_remark: remark, proof_photo: photo, completed_at: todayStr(),
        }).eq('id', id);
        if (error) { toast('Could not mark task as done.', true); return; }
        state.tasks = state.tasks.map(t => t.id === id
          ? { ...t, status: 'done', proofRemark: remark, proofPhoto: photo, completedAt: todayStr() }
          : t);
        closeModal();
        renderTasksPage(document.getElementById('mainContent'));
        toast('Task marked as done!');
        return;
      }

      if (form.dataset.action === 'submit-add-intern') {
        const name = form.name.value.trim();
        if (!name) return;
        if (!state.interns.includes(name)) {
          const dept = form.department.value || DEPARTMENTS[0];
          const { error } = await window.db.from('interns').insert({ name, department: dept });
          if (error) { toast('Could not add intern.', true); return; }
          state.interns.push(name);
          state.internDepts[name] = dept;
        }
        closeModal();
        renderTeamPage(document.getElementById('mainContent'));
        toast('Intern added!');
        return;
      }
    });
  </script>
</body>

</html>
